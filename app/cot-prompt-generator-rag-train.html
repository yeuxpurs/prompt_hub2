<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Prompt Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── 다크 모드 (기본) 변수 ── */
    :root {
      --bg: #0c0d0f;
      --surface: #141519;
      --surface-2: #1a1b21;
      --surface-3: #22232b;
      --border: #2a2b35;
      --border-hover: #3a3b48;
      --text: #e8e9ed;
      --text-2: #9a9ba8;
      --text-3: #65667a;
      --accent: #6c8aff;
      --accent-dim: rgba(108,138,255,0.12);
      --accent-glow: rgba(108,138,255,0.25);
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.12);
      --radius: 10px;
      --radius-sm: 6px;
      --mono: 'DM Mono', 'Consolas', monospace;
      --sans: 'Outfit', 'Noto Sans KR', -apple-system, sans-serif;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── 라이트 모드 변수 ── */
    :root[data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --surface-3: #e2e8f0;
      --border: #e2e8f0;
      --border-hover: #cbd5e1;
      --text: #0f172a;
      --text-2: #475569;
      --text-3: #64748b;
      --accent: #4f46e5;
      --accent-dim: rgba(79,70,229,0.12);
      --accent-glow: rgba(79,70,229,0.25);
      --green: #16a34a;
      --green-dim: rgba(22,163,74,0.12);
      --amber: #d97706;
      --amber-dim: rgba(245,158,11,0.12);
      --red: #dc2626;
      --red-dim: rgba(239,68,68,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      transition: background-color var(--transition), color var(--transition);
    }

    /* ── Top Bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    :root[data-theme="light"] .topbar { background: rgba(248, 250, 252, 0.85); }
    :root:not([data-theme="light"]) .topbar { background: rgba(12, 13, 15, 0.85); }

    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      font-family: var(--mono); font-size: 13px; font-weight: 500;
      color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .logo-dot {
      width: 8px; height: 8px; background: var(--accent);
      border-radius: 50%; box-shadow: 0 0 8px var(--accent-glow);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    
    .topbar-controls { display: flex; gap: 6px; align-items: center; }
    .ctrl-group {
      display: flex; align-items: center; gap: 0;
      background: var(--surface-2); border-radius: var(--radius-sm);
      border: 1px solid var(--border); overflow: hidden;
    }
    .ctrl-label {
      font-size: 10px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-3); padding: 0 10px;
      white-space: nowrap; border-right: 1px solid var(--border);
    }
    .ctrl-select {
      background: transparent; border: none; color: var(--text);
      font-size: 12px; font-family: var(--mono); padding: 8px 10px;
      cursor: pointer; outline: none; -webkit-appearance: none; appearance: none;
      min-width: 90px;
    }
    .ctrl-select option { background: var(--surface-2); color: var(--text); }

    /* 테마 버튼 */
    .theme-btn {
      background: transparent; border: none; color: var(--text);
      padding: 8px 12px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: background var(--transition);
    }
    .theme-btn:hover { background: var(--surface-3); }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 56px); }
    @media (max-width: 1080px) { .layout { grid-template-columns: 1fr; } }

    .panel { padding: 28px; overflow-y: auto; max-height: calc(100vh - 56px); }
    .panel-input { border-right: 1px solid var(--border); }
    .panel-output { background: var(--surface); }

    /* ── Section Headers ── */
    .section { margin-bottom: 28px; }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .section-num {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      color: var(--accent); background: var(--accent-dim);
      padding: 3px 8px; border-radius: 4px; letter-spacing: 0.5px;
    }
    .section-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
    .section-divider {
      height: 1px; background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
      margin: 28px 0;
    }

    /* ── Form Elements ── */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .field-row.full { grid-template-columns: 1fr; }
    .field-row.triple { grid-template-columns: 1fr 1fr 1fr; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-3); }

    .input, .textarea, .select {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: var(--sans); font-size: 13px; padding: 10px 12px;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none; width: 100%;
    }
    .input:focus, .textarea:focus, .select:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .input::placeholder, .textarea::placeholder { color: var(--text-3); font-size: 12px; }
    .textarea { resize: vertical; min-height: 80px; line-height: 1.7; }
    .select {
      cursor: pointer; -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='gray' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 12px center; padding-right: 30px;
    }

    /* ── Checkbox Group ── */
    .check-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .check-item {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 7px 12px; cursor: pointer;
      transition: all var(--transition); font-size: 12px; color: var(--text-2); user-select: none;
    }
    .check-item:hover { border-color: var(--border-hover); }
    .check-item.active { border-color: var(--accent); background: var(--accent-dim); color: var(--text); }
    .check-item input[type="checkbox"] { display: none; }
    .check-dot {
      width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--text-3);
      display: flex; align-items: center; justify-content: center; transition: all var(--transition); flex-shrink: 0;
    }
    .check-item.active .check-dot { background: var(--accent); border-color: var(--accent); }
    .check-dot svg { opacity: 0; transition: opacity var(--transition); stroke: #fff; }
    .check-item.active .check-dot svg { opacity: 1; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px; border: none;
      border-radius: var(--radius-sm); padding: 8px 14px; font-family: var(--sans);
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all var(--transition); white-space: nowrap;
    }
    .btn-ghost { background: var(--surface-3); color: var(--text-2); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); background: var(--border); }
    .btn-accent { background: var(--accent); color: #ffffff; font-weight: 600; }
    :root:not([data-theme="light"]) .btn-accent { color: #0c0d0f; }
    .btn-accent:hover { filter: brightness(1.1); box-shadow: 0 0 16px var(--accent-dim); }
    .btn-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
    .btn-green:hover { background: rgba(74,222,128,0.2); }
    .btn-sm { padding: 6px 10px; font-size: 11px; }

    /* ── Output Panel ── */
    .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .output-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .output-badge { font-family: var(--mono); font-size: 10px; color: var(--green); background: var(--green-dim); padding: 3px 8px; border-radius: 4px; letter-spacing: 0.5px; }
    .output-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .prompt-display {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; font-family: var(--mono); font-size: 12px; line-height: 1.8;
      color: var(--text-2); white-space: pre-wrap; word-break: break-word;
      min-height: 400px; max-height: calc(100vh - 220px); overflow-y: auto; position: relative;
    }

    /* ── Export Drawer ── */
    .export-drawer { margin-top: 20px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .export-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; cursor: pointer; font-size: 12px; font-weight: 500;
      color: var(--text-2); user-select: none; transition: color var(--transition);
    }
    .export-toggle:hover { color: var(--text); }
    .export-toggle svg { transition: transform var(--transition); }
    .export-toggle.open svg { transform: rotate(180deg); }
    .export-body { display: none; padding: 0 16px 14px; }
    .export-body.open { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface-3); border: 1px solid var(--border); color: var(--text);
      padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 500;
      z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <span class="logo-dot"></span>
      <span id="app_logo_text">RAG PROMPT GEN</span>
    </div>
  </div>
  <div class="topbar-controls">
    
    <div class="ctrl-group">
      <button class="theme-btn" id="btn_theme_toggle" title="테마 변경">
        <svg id="icon_sun" style="display:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="icon_moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">LANG</span>
      <select class="ctrl-select" id="language">
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="ko">한국어</option>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">DOMAIN</span>
      <select class="ctrl-select" id="domain">
        <option value="auto">Automotive</option>
        <option value="finance">Finance</option>
        <option value="medical">Medical</option>
        <option value="general">General</option>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">MODEL</span>
      <select class="ctrl-select" id="model">
        <option value="Claude 4 Opus">Claude 4 Opus</option>
        <option value="Claude 4 Sonnet">Claude 4 Sonnet</option>
        <option value="GPT-4o">GPT-4o</option>
        <option value="GPT-4.5">GPT-4.5</option>
        <option value="Gemini 2.5 Pro">Gemini 2.5 Pro</option>
        <option value="Gemini 2.5 Flash">Gemini 2.5 Flash</option>
        <option value="DeepSeek-R1">DeepSeek-R1</option>
        <option value="Llama 4 Scout">Llama 4 Scout</option>
        <option value="Llama 4 Maverick">Llama 4 Maverick</option>
        <option value="Qwen3 235B">Qwen3 235B</option>
        <option value="Mistral Large">Mistral Large</option>
        <option value="Custom">Custom / Other</option>
      </select>
    </div>
  </div>
</div>

<div class="layout">

  <div class="panel panel-input">
    <div class="section">
      <div class="section-header">
        <span class="section-num">01</span>
        <span class="section-title" id="sec1_title"></span>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" id="label_role"></label>
          <input class="input" id="role" type="text" />
        </div>
        <div class="field">
          <label class="field-label" id="label_goal"></label>
          <input class="input" id="goal" type="text" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" id="label_context"></label>
          <textarea class="textarea" id="context"></textarea>
        </div>
        <div class="field">
          <label class="field-label" id="label_constraints"></label>
          <textarea class="textarea" id="constraints"></textarea>
        </div>
      </div>
    </div>

    <div class="section-divider"></div>

    <div class="section">
      <div class="section-header">
        <span class="section-num">02</span>
        <span class="section-title" id="sec2_title"></span>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" id="label_entities"></label>
          <input class="input" id="entities" type="text" />
        </div>
        <div class="field">
          <label class="field-label" id="label_search_mode"></label>
          <select class="select" id="search_mode">
            <option value="hybrid">Hybrid</option>
            <option value="keyword">Keyword</option>
            <option value="semantic">Semantic</option>
          </select>
        </div>
      </div>
      <div class="field-row triple">
        <div class="field">
          <label class="field-label" id="label_time_from"></label>
          <input class="input" id="time_from" type="date" />
        </div>
        <div class="field">
          <label class="field-label" id="label_time_to"></label>
          <input class="input" id="time_to" type="date" />
        </div>
        <div class="field">
          <label class="field-label" id="label_sources"></label>
          <div class="check-group">
            <label class="check-item active" id="chk_tech_docs">
              <input type="checkbox" id="src_tech_docs" checked />
              <span class="check-dot"><svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5L7 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <span id="lbl_src_tech"></span>
            </label>
            <label class="check-item active" id="chk_test_reports">
              <input type="checkbox" id="src_test_reports" checked />
              <span class="check-dot"><svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5L7 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <span id="lbl_src_test"></span>
            </label>
            <label class="check-item" id="chk_email">
              <input type="checkbox" id="src_email" />
              <span class="check-dot"><svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5L7 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <span id="lbl_src_email"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="section-divider"></div>

    <div class="section">
      <div class="section-header">
        <span class="section-num">03</span>
        <span class="section-title" id="sec3_title"></span>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" id="label_queries"></label>
          <textarea class="textarea" id="queries"></textarea>
          <div class="btn-row">
            <button class="btn btn-ghost btn-sm" id="btn_gen_queries">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
              <span id="btn_gen_queries_text"></span>
            </button>
          </div>
        </div>
        <div class="field">
          <label class="field-label" id="label_hyde"></label>
          <textarea class="textarea" id="hyde"></textarea>
          <div class="btn-row">
            <button class="btn btn-ghost btn-sm" id="btn_gen_hyde">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
              <span id="btn_gen_hyde_text"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel panel-output">
    <div class="output-header">
      <div class="output-title">
        <span id="label_final_prompt"></span>
        <span class="output-badge">SYSTEM PROMPT</span>
      </div>
      <div class="output-actions">
        <button class="btn btn-accent" id="btn_build">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          <span id="btn_build_text"></span>
        </button>
        <button class="btn btn-green" id="btn_copy">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span id="btn_copy_text"></span>
        </button>
        <button class="btn btn-ghost" id="btn_clear">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          <span id="btn_clear_text"></span>
        </button>
      </div>
    </div>

    <div class="prompt-display" id="prompt_out" aria-label="prompt output"></div>

    <div class="export-drawer">
      <div class="export-toggle" id="export_toggle" onclick="toggleExport()">
        <span id="export_label"></span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="export-body" id="export_body">
        <button class="btn btn-ghost btn-sm" id="btn_export_json">JSON</button>
        <button class="btn btn-ghost btn-sm" id="btn_export_csv">CSV</button>
        <button class="btn btn-ghost btn-sm" id="btn_export_instr">Instruct JSON</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ═══════════════════════════════════════════════════════════════
  //  THEME TOGGLE LOGIC

  const themeBtn = document.getElementById('btn_theme_toggle');

    document.getElementById('btn_build_text').textContent = t.buttons.build;
    document.getElementById('btn_copy_text').textContent = t.buttons.copy;
    document.getElementById('btn_clear_text').textContent = t.buttons.clear;
    document.getElementById('btn_gen_queries_text').textContent = t.buttons.gen_q;
    document.getElementById('btn_gen_hyde_text').textContent = t.buttons.gen_h;
    document.getElementById('export_label').textContent = t.buttons.export;

    // Placeholder Handling based on example data if language is ko/en, else fallback
    const ex = config.example; const $ = id => document.getElementById(id);
    if(lang === 'ko') {
      $('role').placeholder = ex.role ? `예: ${ex.role}` : "예: 전문가"; $('goal').placeholder = ex.goal ? `예: ${ex.goal}` : "예: 목표";
      $('context').placeholder = ex.context ? `예: ${ex.context}` : "예: 배경"; $('constraints').placeholder = ex.constraints ? `예: ${ex.constraints}` : "예: 제약조건";
      $('entities').placeholder = ex.entities ? `예: ${ex.entities}` : "예: 키워드";
    } else {
      $('role').placeholder = "e.g. Expert"; $('goal').placeholder = "e.g. Goal";
      $('context').placeholder = "e.g. Background info"; $('constraints').placeholder = "e.g. Markdown format";
      $('entities').placeholder = "e.g. keyword1, keyword2";
    }
  }

  function suggestQueries() {
    const config = domainConfigs[currentDomain];
    const combined = ['role','goal','context','entities'].map(id => document.getElementById(id).value).join(' ');
    let tokens = uniq(tokenize(combined));
    const synMap = config.synonyms || {};
    const expanded = new Set(tokens);
    tokens.forEach(tok => { if (synMap[tok]) synMap[tok].forEach(s => expanded.add(s)); });
    
    const base = Array.from(expanded).slice(0, 10);
    const queries = [];
    
    if (base.length > 2) {
      const b0 = base[0], b1 = base[1], b2 = base.slice(0, 3).join(' ');
      const tMap = {
        ko: [`'${b0}' 원인 분석 관련 문서`, `'${b0}' 관련 '${b1}' 시험 결과 보고서`, `'${b2}' 문제 해결 사례`],
        ja: [`「${b0}」の原因分析関連ドキュメント`, `「${b0}」および「${b1}」のテスト結果報告書`, `「${b2}」の問題解決事例`],
        zh: [`“${b0}”原因分析相关文档`, `“${b0}”与“${b1}”测试结果报告`, `“${b2}”问题解决案例`],
        es: [`Documentos de análisis de causa de "${b0}"`, `Informes de prueba de "${b0}" y "${b1}"`, `Casos de resolución de "${b2}"`],
        fr: [`Documents d'analyse des causes de "${b0}"`, `Rapports de test de "${b0}" et "${b1}"`, `Cas de résolution de "${b2}"`],
        en: [`"${b0}" root cause analysis documents`, `"${b0}" and "${b1}" related test reports`, `"${b2}" issue resolution history`]
      };
      queries.push(...(tMap[currentLanguage] || tMap['en']));
    }
    
    const goalText = document.getElementById('goal').value.trim();
    if (goalText) queries.push(goalText);
    document.getElementById('queries').value = uniq(queries).join('\n');
  }

  function generateHyde() {
    const lang = currentLanguage;
    const config = domainConfigs[currentDomain];
    const goal = document.getElementById('goal').value.trim();
    const context = document.getElementById('context').value.trim();
    const entities = document.getElementById('entities').value.trim();
    const combined = [goal, context, entities].join(' ');
    
    let tokens = uniq(tokenize(combined));
    const synMap = config.synonyms || {};
    const expanded = new Set(tokens);
    tokens.forEach(tok => { if (synMap[tok]) synMap[tok].forEach(s => expanded.add(s)); });
    const keywords = Array.from(expanded);

    let hydeText = '';
    const errMap = {
      ko: "관련 정보를 찾기 위한 충분한 단서가 제공되지 않았습니다.", ja: "関連情報を見つけるための十分な手がかりがありません。",
      zh: "没有提供足够的线索来寻找相关信息。", en: "Not enough information provided to generate a hypothetical answer.",
      es: "No se proporcionó suficiente información para generar una respuesta.", fr: "Pas assez d'informations pour générer une réponse."
    };

    if (keywords.length === 0) {
      hydeText = errMap[lang] || errMap['en'];
    } else {
      const k1 = keywords[0] || '', k2 = keywords[1] || '';
      const subject = goal || context || k1;
      
      const tMap = {
        ko: `${subject} 현상의 주요 원인은 ${k1}${k2 ? ' 및 ' + k2 : ''} 요인으로 인해 발생한 것으로 보입니다. 관련 데이터에서 유사한 현상이 관찰되었습니다.`,
        ja: `${subject} の主な原因は、${k1}${k2 ? ' および ' + k2 : ''} の要因によるものと思われます。関連データで類似の現象が観察されています。`,
        zh: `${subject} 现象的主要原因似乎是 ${k1}${k2 ? ' 和 ' + k2 : ''}。在相关数据中观察到了类似现象。`,
        en: `The primary cause of the ${subject} appears to be factors related to ${k1}${k2 ? ' and ' + k2 : ''}. Similar phenomena have been observed in related data.`,
        es: `La causa principal de ${subject} parece estar relacionada con factores como ${k1}${k2 ? ' y ' + k2 : ''}. Se han observado fenómenos similares.`,
        fr: `La cause principale de ${subject} semble être liée à des facteurs tels que ${k1}${k2 ? ' et ' + k2 : ''}. Des phénomènes similaires ont été observés.`
      };
      hydeText = tMap[lang] || tMap['en'];
    }
    document.getElementById('hyde').value = hydeText;
  }

  function buildPrompt() {
    const lang = currentLanguage;
    const config = domainConfigs[currentDomain];
    const tSec = translations[lang].promptSections;
    
    const role = document.getElementById('role').value.trim() || config.defaultRole[lang] || config.defaultRole['en'];
    const goal = document.getElementById('goal').value.trim();
    const context = document.getElementById('context').value.trim();
    const constraints = document.getElementById('constraints').value.trim();
    const entities = document.getElementById('entities').value.trim();
    
    const dMapFrom = { ko: '전체', ja: 'すべて', zh: '全部', en: 'All', es: 'Todo', fr: 'Tout' };
    const dMapTo = { ko: '현재', ja: '現在', zh: '现在', en: 'Present', es: 'Presente', fr: 'Présent' };
    const timeFrom = document.getElementById('time_from').value || dMapFrom[lang];
    const timeTo = document.getElementById('time_to').value || dMapTo[lang];

    const sources = [];
    if (document.getElementById('src_tech_docs').checked) sources.push(config.sourceLabels[lang].tech_docs);
    if (document.getElementById('src_test_reports').checked) sources.push(config.sourceLabels[lang].test_reports);
    if (document.getElementById('src_email').checked) sources.push(config.sourceLabels[lang].email);
    
    const sMapAll = { ko: '전체 데이터소스', ja: 'すべてのデータソース', zh: '所有数据源', en: 'All data sources', es: 'Todas las fuentes', fr: 'Toutes les sources' };
    const sourcesText = sources.length ? sources.join(', ') : sMapAll[lang];
    const modeText = document.getElementById('search_mode').selectedOptions[0].text;
    const queryLines = document.getElementById('queries').value.trim().split(/\n+/).filter(Boolean);

    let sysMap = {
      ko: `너는 최고의 ${role}다.\n주어진 정보와 검색 계획에 따라 사용자의 목표 달성을 도와야 한다.\n모든 답변은 반드시 검색된 내부 ${config.knowledgeSource[lang]}에 근거해야 하며, 추측은 금지된다.\n답변은 한국어로 작성한다.`,
      ja: `あなたは最高の ${role} です。\n提供された情報と検索計画に従って、ユーザーの目標達成を支援してください。\nすべての回答は検索された内部の ${config.knowledgeSource[lang]} に基づく必要があり、推測は禁止されています。\n回答は日本語で作成してください。`,
      zh: `你是最好的 ${role}。\n根据提供的信息和检索计划，帮助用户实现目标。\n所有回答必须基于检索到的内部 ${config.knowledgeSource[lang]}，禁止猜测。\n请用中文回答。`,
      en: `You are an expert ${role}.\nFollowing the given information and retrieval plan, help achieve the user's goal.\nAll answers must be based on retrieved internal ${config.knowledgeSource[lang]}, and speculation is forbidden.\nProvide the answer in English.`,
      es: `Eres un ${role} experto.\nSiguiendo la información y el plan de búsqueda, ayuda a lograr el objetivo del usuario.\nLas respuestas deben basarse en ${config.knowledgeSource[lang]} internos, sin especular.\nResponde en Español.`,
      fr: `Vous êtes un ${role} expert.\nEn suivant les informations et le plan, aidez à atteindre l'objectif de l'utilisateur.\nLes réponses doivent se baser sur des ${config.knowledgeSource[lang]} internes, sans spéculation.\nRépondez en Français.`
    };

    let user = `${tSec.goal}\n${goal || tSec.noGoal}\n\n${tSec.context}\n${context || tSec.noContext}\n\n${tSec.entities}\n${entities || tSec.noEntities}`;

    let planMap = { ko: '검색 기간', ja: '検索期間', zh: '检索期间', en: 'Time range', es: 'Rango de tiempo', fr: 'Période' };
    let srcMap = { ko: '검색 대상', ja: '検索対象', zh: '数据源', en: 'Data sources', es: 'Fuentes', fr: 'Sources' };
    let modeMap = { ko: '검색 방식', ja: '検索モード', zh: '检索模式', en: 'Search mode', es: 'Modo de búsqueda', fr: 'Mode de recherche' };
    let qMap = { ko: '상세 질의', ja: '詳細クエリ', zh: '详细查询', en: 'Search queries', es: 'Consultas', fr: 'Requêtes' };

    let plan = `${tSec.retrievalPlan}\n`;
    plan += `- ${planMap[lang]}: ${timeFrom} ~ ${timeTo}\n`;
    plan += `- ${srcMap[lang]}: ${sourcesText}\n`;
    plan += `- ${modeMap[lang]}: ${modeText}\n`;
    plan += `- ${qMap[lang]}:\n`;
    plan += queryLines.length ? queryLines.map(q => '  - ' + q).join('\n') : '  - (' + tSec.noQueries + ')';

    const gl = translations[lang].outputGuidelines;
    let fmtMsg = { ko: '아래 지침에 따라 최종 결과물을 생성하세요.', ja: '以下のガイドラインに従って最終結果を作成してください。', zh: '请根据以下指南生成最终结果。', en: 'Follow these guidelines to produce the final answer.', es: 'Siga estas pautas para generar el resultado.', fr: 'Suivez ces directives pour produire le résultat final.' };
    let constMsg = { ko: '- 추가 요구사항: ', ja: '- 追加の要件: ', zh: '- 附加要求: ', en: '- Additional Constraints: ', es: '- Restricciones Adicionales: ', fr: '- Contraintes Supplémentaires: ' };

    let fmt = `${tSec.outputFormat}\n${fmtMsg[lang]}\n`;
    gl.forEach(l => { fmt += l + '\n'; });
    if (constraints) fmt += constMsg[lang] + constraints;

    const final = `[SYSTEM INSTRUCTIONS]\n${sysMap[lang] || sysMap['en']}\n────────────────────────────────\n[USER REQUEST]\n${user}\n\n${plan}\n\n${fmt}`;
    document.getElementById('prompt_out').textContent = final;
  }

  // ═══════════════════════════════════════════════════════════════
  //  EVENT LISTENERS & INIT
  // ═══════════════════════════════════════════════════════════════
  document.getElementById('queries').addEventListener('input', () => { queriesModified = true; });
  document.getElementById('hyde').addEventListener('input', () => { hydeModified = true; });

  document.getElementById('btn_gen_queries').addEventListener('click', () => { suggestQueries(); queriesModified = false; if (!hydeModified) generateHyde(); buildPrompt(); });
  document.getElementById('btn_gen_hyde').addEventListener('click', () => { generateHyde(); hydeModified = false; });
  document.getElementById('btn_build').addEventListener('click', buildPrompt);
  
  document.getElementById('btn_copy').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('prompt_out').textContent).then(() => {
      const m = {ko:'복사 완료', ja:'コピーしました', zh:'已复制', en:'Copied!', es:'¡Copiado!', fr:'Copié !'};
      showToast('✓ ' + (m[currentLanguage]||m['en']));
    });
  });
  
  document.getElementById('btn_clear').addEventListener('click', () => {
    ['role','goal','context','constraints','entities','queries','hyde','time_from','time_to'].forEach(id => document.getElementById(id).value = '');
    const defaults = domainConfigs[currentDomain].defaultSources;
    document.getElementById('src_tech_docs').checked = !!defaults.tech_docs;
    document.getElementById('src_test_reports').checked = !!defaults.test_reports;
    document.getElementById('src_email').checked = !!defaults.email;
    syncCheckUI(); queriesModified = false; hydeModified = false; buildPrompt();
  });

  document.querySelectorAll('.check-item input').forEach(cb => { cb.addEventListener('change', () => { syncCheckUI(); buildPrompt(); }); });

  document.getElementById('domain').addEventListener('change', e => { 
    currentDomain = e.target.value; 
    const defaults = domainConfigs[currentDomain].defaultSources;
    document.getElementById('src_tech_docs').checked = !!defaults.tech_docs;
    document.getElementById('src_test_reports').checked = !!defaults.test_reports;
    document.getElementById('src_email').checked = !!defaults.email;
    syncCheckUI(); updateUI(); suggestQueries(); generateHyde(); buildPrompt(); 
  });
  document.getElementById('language').addEventListener('change', e => { currentLanguage = e.target.value; updateUI(); suggestQueries(); generateHyde(); buildPrompt(); });
  
  ['goal','context','entities'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      if (!queriesModified) suggestQueries();
      if (!hydeModified) generateHyde();
      buildPrompt();
    });
  });
  ['role','constraints','time_from','time_to','search_mode'].forEach(id => {
    const el = document.getElementById(id); if(el) el.addEventListener(el.tagName === 'SELECT' ? 'change' : 'input', buildPrompt);
  });

  window.addEventListener('DOMContentLoaded', () => { 
    document.getElementById('language').value = currentLanguage; 
    document.getElementById('domain').value = currentDomain;
    updateUI(); 
    syncCheckUI();
    buildPrompt(); 
  });
</script>
</body>
</html>
